name: ci

on:
  push:
    branches:
      - '*'
    tags:
      - '*'
  pull_request:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runs-on: ubuntu-latest
            os: linux
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
            os: linux
          - name: darwin-amd64
            runs-on: macos-15-intel
            os: darwin
          - name: darwin-arm64
            runs-on: macos-15
            os: darwin
    steps:
      - uses: actions/checkout@v7
      - if: matrix.os == 'linux'
        run: docker build -o ${{ matrix.name }} -f build/Dockerfile .
      - if: matrix.os == 'darwin'
        run: |
          uname -a
          sw_vers
          system_profiler SPHardwareDataType
      - if: matrix.os == 'darwin'
        run: bash build/github-actions.sh mac_prepare_tools
      - if: matrix.os == 'darwin'
        run: bash build/github-actions.sh mac_build_perl
      - if: matrix.os == 'darwin'
        run: bash build/github-actions.sh mac_create_artifacts
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      id-token: write # actions/attest
      attestations: write # actions/attest
      artifact-metadata: write # actions/attest
      contents: write # gh release
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: linux-amd64
          path: linux-amd64
      - uses: actions/download-artifact@v8
        with:
          name: linux-arm64
          path: linux-arm64
      - uses: actions/download-artifact@v8
        with:
          name: darwin-amd64
          path: darwin-amd64
      - uses: actions/download-artifact@v8
        with:
          name: darwin-arm64
          path: darwin-arm64
      - uses: actions/attest@v4
        id: attest
        with:
          subject-path: |
            linux-*/*.gz
            linux-*/*.xz
            darwin-*/*.gz
            darwin-*/*.xz
      - name: create release and upload release assets
        run: |
          gh release create --repo ${{ github.repository }} ${{ github.ref }} \
            --notes "Artifact attestation: ${{ steps.attest.outputs.attestation-url }}" \
            linux-*/*.gz linux-*/*.xz darwin-*/*.gz darwin-*/*.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
